<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Share Me</title>
    <meta name="theme-color" content="#0f172a" />
    <link rel="manifest" href="manifest.json" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="alternate icon" href="favicon.svg" />
    <link rel="stylesheet" href="style.css" />
    <!-- QR Code libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  </head>
  <body>
    <div class="mobile-container">
      <!-- Back Button -->
      <div class="back-button" id="back-btn" style="display: none">
        <span>←</span>
        <span>Back</span>
      </div>

      <!-- Initial Connection Screen -->
      <div class="screen" id="connection-screen">
        <div class="welcome-content">
          <h1>Share Me</h1>
          <p>Transfer files directly between devices - No limits, No servers</p>

          <div class="input-section">
            <input type="text" id="room-input" placeholder="Enter room code" />
            <div class="join-actions">
              <button id="join-room" class="primary-btn">Join Room</button>
              <button id="scan-qr-btn" class="secondary-btn icon-btn" title="Scan QR Code">📷</button>
            </div>
          </div>
          
          <!-- Scanner Container -->
          <div id="reader-container" style="display: none;">
            <div id="reader"></div>
            <button id="close-scanner-btn" class="secondary-btn" style="margin-top: 10px;">Close Scanner</button>
          </div>

          <div class="divider">
            <span>or</span>
          </div>

          <button id="generate-room" class="secondary-btn">
            Create New Room
          </button>
        </div>
      </div>

      <!-- Room Screen -->
      <div class="screen" id="room-screen" style="display: none">
        <!-- Room Info -->
        <div class="room-header">
          <div class="room-header-top">
            <h2>Room: <span id="current-room" class="room-code"></span></h2>
            <div class="connection-quality">
              <span class="quality-dot" id="quality-dot">●</span>
              <span id="quality-text">--</span>
            </div>
          </div>
          <p>Share this code with other devices to connect</p>
          <div class="room-actions">
            <button id="copy-code" class="primary-btn">Copy Code</button>
            <button id="toggle-qr-btn" class="secondary-btn">📷 QR Code</button>
          </div>
          <!-- QR Code panel (hidden by default) -->
          <div class="qr-container" id="qr-container" style="display:none">
            <div id="qr-code"></div>
            <p class="qr-hint">📷 Scan to join this room</p>
          </div>
        </div>

        <!-- Connected Devices -->
        <div class="connected-section">
          <div id="users-list"></div>
        </div>

        <!-- File Drop Zone -->
        <div class="drop-zone-container">
          <div class="file-drop-zone" id="file-drop-zone">
            <div class="drop-icon">📁</div>
            <p>Drop files/folders here or click to select</p>
            <input type="file" id="file-input" multiple />
            <input
              type="file"
              id="folder-input"
              webkitdirectory
              directory
              multiple
              mozdirectory
              style="display: none"
            />
            <div class="file-buttons">
              <button
                class="primary-btn"
                onclick="document.getElementById('file-input').click()"
              >
                Select Files
              </button>
              <button class="secondary-btn" id="folder-select-btn">
                📂 Select Folder
              </button>
            </div>
          </div>
        </div>

        <!-- Receiving Files -->
        <div
          class="receiving-section"
          id="receiving-section"
          style="display: none"
        >
          <h3>Receiving:</h3>
          <div id="received-files"></div>
        </div>

        <!-- Sending Files -->
        <div class="sending-section" id="sending-section" style="display: none">
          <h3>Sending:</h3>
          <div id="file-list"></div>
        </div>
      </div>

      <!-- Developer Credit -->
      <div class="developer-credit">
        <p>
          Developed with ❤️ by <span class="developer-name">Raj Vankar</span>
        </p>
      </div>
    <!-- Socket.IO -->
    <script src="/socket.io/socket.io.js"></script>
    
    <!-- ES6 Component-Based App -->
    <script type="module" src="js/main.js"></script>
  </body>
</html>
